<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translacent"/>
  <title>Block Puzzle</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>
<div id="app-container">

  <!-- MENU -->
  <section id="screen-menu" class="screen screen--active">
    <div class="menu__inner">
      <h1 class="menu__title">BLOCK<br>PUZZLE</h1>
      <p class="menu__subtitle">Select a mode to begin</p>
      <div class="mode-grid" role="list" aria-label="Mode selection">
        <div class="mode-card mode-card--easy" role="listitem" data-mode="easy" tabindex="0" aria-label="Easy mode">
          <span class="mode-card__icon">🌿</span>
          <span class="mode-card__label">EASY</span>
          <span class="mode-card__desc">Relaxed play</span>
          <span class="mode-card__best" id="best-easy">Best: 0</span>
        </div>
        <div class="mode-card mode-card--medium" role="listitem" data-mode="medium" tabindex="0" aria-label="Medium mode">
          <span class="mode-card__icon">⚡</span>
          <span class="mode-card__label">MEDIUM</span>
          <span class="mode-card__desc">Balanced challenge</span>
          <span class="mode-card__best" id="best-medium">Best: 0</span>
        </div>
        <div class="mode-card mode-card--hard" role="listitem" data-mode="hard" tabindex="0" aria-label="Hard mode">
          <span class="mode-card__icon">🔥</span>
          <span class="mode-card__label">HARD</span>
          <span class="mode-card__desc">Maximum density</span>
          <span class="mode-card__best" id="best-hard">Best: 0</span>
        </div>
      </div>
    </div>
  </section>

  <!-- GAME -->
  <section id="screen-game" class="screen">
    <header class="status-bar">
      <button class="btn btn--icon status-bar__back" id="btn-back" aria-label="Back">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      </button>
      <div class="status-bar__score-area">
        <span class="score-current" id="current-score">0</span>
        <span class="score-label">Score</span>
      </div>
      <div class="status-bar__meta">
        <span class="mode-indicator" id="mode-indicator">EASY</span>
        <span class="score-best">Best: <span id="best-score">0</span></span>
      </div>
    </header>
    <div class="grid-wrapper" id="grid-wrapper">
      <div class="grid-canvas" id="grid-canvas"></div>
    </div>
    <div class="tray" id="piece-tray">
      <div class="tray__slot" id="tray-slot-0" data-slot="0"></div>
      <div class="tray__slot" id="tray-slot-1" data-slot="1"></div>
      <div class="tray__slot" id="tray-slot-2" data-slot="2"></div>
    </div>
  </section>

  <!-- GAME OVER MODAL -->
  <div id="gameOverModal" class="game-over-modal" aria-hidden="true">
    <div class="game-over__dialog" role="dialog" aria-modal="true" aria-labelledby="gameOverTitle">
      <div class="game-over__skull">💀</div>
      <h2 class="game-over__title" id="gameOverTitle">GAME OVER</h2>
      <p class="game-over__subtitle">No more moves available</p>
      <div class="game-over__score-panel">
        <div class="game-over__score-row">
          <span class="game-over__score-label">Final Score</span>
          <span class="game-over__score-value" id="goFinalScore">0</span>
        </div>
        <div class="game-over__score-row game-over__score-row--best">
          <span class="game-over__score-label">Best Score</span>
          <span class="game-over__score-value" id="goBestScore">0</span>
        </div>
        <div class="game-over__new-best" id="goNewBest">🎉 New Best!</div>
      </div>
      <div class="game-over__actions">
        <button class="btn btn--go-menu" id="btn-go-menu">Menu</button>
        <button class="btn btn--go-retry" id="btn-go-retry">Play Again</button>
      </div>
    </div>
  </div>

</div>

<script src="game.js"></script>
<script>
(function(){
'use strict';
try {

function onReady(fn){
  if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',fn,{once:true});}
  else{fn();}
}

var GRID = BlockPuzzle.GRID;

// FIX 1: Pre-build color→CSS string cache so renderGrid never interpolates strings
// Each unique color gets one pre-built background string. Avoids string concat per cell per render.
var _bgCache = Object.create(null);
function getBg(color){
  if(!_bgCache[color]) _bgCache[color]='linear-gradient(145deg,'+color+'ee,'+color+'bb)';
  return _bgCache[color];
}

onReady(function initUI(){

  var ui = { screen:'menu', activeMode:null, _scoreAnimating:false };

  var $menu  = document.getElementById('screen-menu');
  var $game  = document.getElementById('screen-game');
  var $goModal = document.getElementById('gameOverModal');
  var $grid  = document.getElementById('grid-canvas');
  var $wrapper = document.getElementById('grid-wrapper');
  var $curScore = document.getElementById('current-score');
  var $bestScore = document.getElementById('best-score');
  var $modeIndicator = document.getElementById('mode-indicator');

  // ── Screens ──
  function showScreen(name){
    ui.screen=name;
    $menu.classList.toggle('screen--active',name==='menu');
    $game.classList.toggle('screen--active',name==='game');
  }

  // ── Game Over Modal ──
  function showGameOver(finalScore,bestScore,isNewBest){
    document.getElementById('goFinalScore').textContent=finalScore;
    document.getElementById('goBestScore').textContent=bestScore;
    document.getElementById('goNewBest').style.display=isNewBest?'block':'none';
    $goModal.classList.add('game-over-modal--visible');
    $goModal.setAttribute('aria-hidden','false');
  }
  function hideGameOver(){
    $goModal.classList.remove('game-over-modal--visible');
    $goModal.setAttribute('aria-hidden','true');
  }

  // ── Mode best scores ──
  function updateModeBestScores(){
    ['easy','medium','hard'].forEach(function(m){
      var el=document.getElementById('best-'+m);
      if(el)el.textContent='Best: '+BlockPuzzle.getModeHigh(m);
    });
  }

  // ── Mode card click ──
  document.querySelectorAll('.mode-card').forEach(function(card){
    card.addEventListener('click',function(){
      var mode=card.dataset.mode;
      if(mode){ui.activeMode=mode;startGame(mode);}
    });
    card.addEventListener('keydown',function(e){
      if(e.key==='Enter'||e.key===' '){e.preventDefault();var mode=card.dataset.mode;if(mode){ui.activeMode=mode;startGame(mode);}}
    });
  });

  // ── Projection ──
  // FIX 2: Track projection state per-cell with a typed array.
  // clearProj only touches cells that were actually projected — no full scan.
  // Use add/remove individual classes instead of setting full className string
  // (className= triggers style invalidation even when unchanged).
  var _projCells = [];
  function clearProj(){
    for(var i=0;i<_projCells.length;i++){
      var c=$grid.children[_projCells[i]];
      if(c){
        c.classList.remove('grid-cell--projected-valid','grid-cell--projected-invalid');
      }
    }
    _projCells=[];
  }
  function highlightProj(aR,aC,valid,filled){
    clearProj();
    if(aR<0||aC<0)return;
    var addCls=valid?'grid-cell--projected-valid':'grid-cell--projected-invalid';
    var remCls=valid?'grid-cell--projected-invalid':'grid-cell--projected-valid';
    for(var f=0;f<filled.length;f++){
      var br=aR+filled[f][0],bc=aC+filled[f][1];
      if(br>=0&&br<GRID&&bc>=0&&bc<GRID){
        var idx=br*GRID+bc;
        var el=$grid.children[idx];
        if(el){
          el.classList.remove(remCls);
          el.classList.add(addCls);
          _projCells.push(idx);
        }
      }
    }
  }

  // ────────────────────────────────────────────────────────────
  // GRID RENDERER — dirty-cell diffing + no CSS custom property writes
  // FIX 3: Removed style.setProperty('--block-glow',...) — CSS var writes
  // force style recalc on ALL children even for unrelated cells on Android.
  // Instead: color baked into background only. Glow via ::after pseudo or
  // pre-built box-shadow classes (see style.css).
  // FIX 4: background string built once per color via _bgCache, not per render.
  // FIX 5: Only write style.background when value actually changes (tracked in _prevBg).
  // ────────────────────────────────────────────────────────────
  var _prevGrid = null;
  var _prevBg = null; // parallel array tracking last written background per cell

  function createGrid(){
    $grid.innerHTML='';
    var frag=document.createDocumentFragment();
    for(var r=0;r<GRID;r++)for(var c=0;c<GRID;c++){
      var cell=document.createElement('div');
      cell.className='grid-cell';
      // FIX 6: Don't set dataset.row/col — never read at runtime, wastes setAttribute calls
      frag.appendChild(cell);
    }
    $grid.appendChild(frag);
    _prevGrid=null;
    _prevBg=null;
  }

  function renderGrid(){
    var grid=BlockPuzzle.G.grid;
    var cells=$grid.children;
    var prev=_prevGrid;
    var prevBg=_prevBg;



  if(!prev){
      prev=new Array(GRID*GRID);
      prevBg=new Array(GRID*GRID);
      for(var x=0;x<GRID*GRID;x++){
        prev[x]=undefined;
        prevBg[x]='';
        // Force fully clear style attributes on DOM elements during a reset
        if(cells[x]){
          cells[x].className='grid-cell';
          cells[x].style.background='';
        }
      }
    }




    for(var r=0;r<GRID;r++){
      for(var c=0;c<GRID;c++){
        var idx=r*GRID+c;
        var val=grid[r][c];
        if(val===prev[idx])continue;
        prev[idx]=val;

        var cell=cells[idx];
        if(val==='dead'){
          // FIX 7: Only set className if it actually needs to change
          if(cell.className!=='grid-cell grid-cell--dead') cell.className='grid-cell grid-cell--dead';
          if(prevBg[idx]!==''){cell.style.background='';prevBg[idx]='';}
        }else if(val!==0){
          if(cell.className!=='grid-cell grid-cell--filled') cell.className='grid-cell grid-cell--filled';
          var bg=getBg(val);
          // FIX 8: Only write style.background when color changed
          if(prevBg[idx]!==bg){cell.style.background=bg;prevBg[idx]=bg;}
          // REMOVED: style.setProperty('--block-glow',...) — was causing full subtree style recalc
        }else{
          if(cell.className!=='grid-cell') cell.className='grid-cell';
          if(prevBg[idx]!==''){cell.style.background='';prevBg[idx]='';}
        }
      }
    }
    _prevGrid=prev;
    _prevBg=prevBg;
  }

  // ────────────────────────────────────────────────────────────
  // TRAY RENDERER
  // FIX 9: filled.some() was O(n) per cell in nested loop → use Set lookup O(1)
  // ────────────────────────────────────────────────────────────
  var _trayBuilt=[false,false,false];
  var _trayBlocks=[null,null,null];

  function buildTraySlot(i,piece){
    var slot=document.getElementById('tray-slot-'+i);
    slot.innerHTML='';
    _trayBlocks[i]=null;

    if(piece===null){slot.classList.add('tray__slot--empty');return;}
    slot.classList.remove('tray__slot--empty','tray__slot--selected');

    var shape=piece.shapeMatrix;
    var dims=BlockPuzzle.getDims(shape);
    var rows=dims.rows,cols=dims.cols;
    var trayCellPx=12,trayMaxPx=60;  // FIX: larger cell px, CSS scale(.55) removed so compensate here
    var maxDim=Math.max(rows,cols);
    var rawSize=maxDim*trayCellPx;
    var scale=rawSize>trayMaxPx?trayMaxPx/rawSize:1;
    scale=Math.max(0.4,Math.min(1,scale));

    // FIX 9: Build Set for O(1) lookup instead of Array.some() per cell
    var filledArr=BlockPuzzle.getFilled(shape);
    var filledSet=Object.create(null);
    for(var fi=0;fi<filledArr.length;fi++) filledSet[filledArr[fi][0]+','+filledArr[fi][1]]=1;

    var gridCont=document.createElement('div');
    gridCont.style.cssText='overflow:visible;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;transform:scale('+scale.toFixed(3)+');transform-origin:center center;';

    var blocks=[];
    var baseStyle='width:'+trayCellPx+'px;height:'+trayCellPx+'px;border-radius:1px;';
    var filledBg='background:'+getBg(piece.color)+';box-shadow:inset 0 1px 1px rgba(255,255,255,.3)';
    var frag=document.createDocumentFragment();
    for(var r=0;r<rows;r++){
      var rowDiv=document.createElement('div');
      rowDiv.style.cssText='display:flex;gap:1px;';
      for(var c=0;c<cols;c++){
        var isF=!!filledSet[r+','+c];
        var block=document.createElement('div');
        block.style.cssText=baseStyle+(isF?filledBg:'background:transparent');
        block._isFilled=isF;
        blocks.push(block);
        rowDiv.appendChild(block);
      }
      frag.appendChild(rowDiv);
    }
    gridCont.appendChild(frag);

    var preview=document.createElement('div');
    preview.className='piece-preview';
    preview.appendChild(gridCont);
    slot.appendChild(preview);
    _trayBlocks[i]={blocks:blocks,piece:piece};
  }

  function renderTray(){
    var pieces=BlockPuzzle.G.trayPieces;
    for(var i=0;i<3;i++){
      var piece=pieces[i];
      var slot=document.getElementById('tray-slot-'+i);
      var built=_trayBlocks[i];
      if(piece===null){
        if(built!==null){
          slot.innerHTML='';
          _trayBlocks[i]=null;
          slot.classList.add('tray__slot--empty');
        }
        continue;
      }
      // FIX: pieces have no .id — use reference equality
      if(built&&built.piece===piece){
        slot.classList.remove('tray__slot--empty','tray__slot--selected');
        continue;
      }
      buildTraySlot(i,piece);
    }
  }

  function buildTrayFull(){
    for(var i=0;i<3;i++){_trayBlocks[i]=null;}
    renderTray();
  }

  // ── HUD ──
  function updateHUD(){
    var gs=BlockPuzzle.G;
    $curScore.textContent=Math.floor(gs.currentScore);
    var modeHigh=BlockPuzzle.getModeHigh(gs.activeMode);
    if(gs.currentScore>modeHigh){
      BlockPuzzle.setModeHigh(gs.activeMode,Math.floor(gs.currentScore));
      $bestScore.textContent=Math.floor(gs.currentScore);
    }
  }

  function animateScoreDisplay(from,to){
    if(ui._scoreAnimating)return;
    ui._scoreAnimating=true;
    BlockPuzzle.AnimCtrl.animateScore(from,to,280,function(val){$curScore.textContent=val;});
    setTimeout(function(){ui._scoreAnimating=false;},300);
  }

  function spawnComboPopup(text,row,col){
    var gr=$grid.getBoundingClientRect(),wr=$wrapper.getBoundingClientRect();
    var cs=gr.width/GRID;
    var x=gr.left-wr.left+(col+0.5)*cs;
    var y=gr.top-wr.top+row*cs;
    BlockPuzzle.AnimCtrl.spawnComboPopup(text,$wrapper,x,y);
  }

  // ── Drag Controller ──
  var dragCtrl=new BlockPuzzle.DragController({
    onCommit:function(ti,gR,gC,piece){
      clearProj();
      var result=BlockPuzzle.placeBlock(gR,gC,piece.shapeMatrix,piece.color,ti);
      var gs=BlockPuzzle.G;
      if(result.lines>0){
        // Fix: compute pixel position for combo popup
        var gr=$grid.getBoundingClientRect(),wr=$wrapper.getBoundingClientRect();
        var cs=gr.width/BlockPuzzle.GRID;
        var aR=0,aC=0,cnt=0;
        result.rows.forEach(function(r){aR+=r;cnt++;});
        result.cols.forEach(function(c){aC+=c;cnt++;});
        if(cnt>0){aR/=cnt;aC/=cnt;}
        var px=gr.left-wr.left+(aC+0.5)*cs;
        var py=gr.top-wr.top+aR*cs;
        var ct='+'+result.scoreGained;if(result.combo>1)ct+=' x'+result.combo+' Combo!';
        BlockPuzzle.AnimCtrl.spawnComboPopup(ct,$wrapper,px,py);
        BlockPuzzle.AnimCtrl.blastLines(result.rows,result.cols,$grid).then(function(){
          var cells=$grid.children;
          for(var i=0;i<cells.length;i++){cells[i].classList.remove('grid-cell--blast');cells[i].style.animationDelay='';}
          _prevGrid=null;
          _prevBg=null;
          renderGrid();renderTray();
          if(result.endState&&result.endState.state==='gameover'){
            setTimeout(function(){
              var fs=Math.floor(gs.currentScore);
              var isNewBest=BlockPuzzle.setModeHigh(gs.activeMode,fs);
              showGameOver(fs,BlockPuzzle.getModeHigh(gs.activeMode),isNewBest);
            },200);
          }
        });
      }else{
        renderGrid();renderTray();
        if(result.endState&&result.endState.state==='gameover'){
          setTimeout(function(){
            var fs=Math.floor(gs.currentScore);
            var isNewBest=BlockPuzzle.setModeHigh(gs.activeMode,fs);
            showGameOver(fs,BlockPuzzle.getModeHigh(gs.activeMode),isNewBest);
          },80);
        }
      }
      var prev=gs.currentScore-result.scoreGained;
      animateScoreDisplay(Math.floor(prev),Math.floor(gs.currentScore));
      updateHUD();
    },
    onCancel:function(){clearProj();renderTray();},
    onProjectionChange:function(aR,aC,v,f){highlightProj(aR,aC,v,f);},
    isValidFn:function(r,c,s){return BlockPuzzle.isValid(r,c,s);},
    getFilledCells:function(s){return BlockPuzzle.getFilled(s);},
  });

  function onTrayPointerDown(e,idx){
    var gs=BlockPuzzle.G;
    if(gs.isGameOver)return;
    if(gs.trayPieces[idx]===null)return;
    var slot=document.getElementById('tray-slot-'+idx);
    slot.classList.add('tray__slot--selected');
    dragCtrl.start(e,idx,gs.trayPieces[idx],$grid,slot);
  }

  // ── Game Init ──
  function startGame(mode){
    BlockPuzzle.initMode(mode);
    $modeIndicator.textContent=mode.toUpperCase();
    $bestScore.textContent=BlockPuzzle.getModeHigh(mode);
    $curScore.textContent='0';
    _prevGrid=null;
    _prevBg=null;
    createGrid();
    renderGrid();
    buildTrayFull();
    showScreen('game');
    hideGameOver();
  }

  // ── Events ──
  document.getElementById('btn-back').onclick=function(){showScreen('menu');updateModeBestScores();};
  [0,1,2].forEach(function(i){
    document.getElementById('tray-slot-'+i).addEventListener('pointerdown',function(e){onTrayPointerDown(e,i);});
  });
  document.getElementById('btn-go-menu').onclick=function(){hideGameOver();showScreen('menu');updateModeBestScores();};
  document.getElementById('btn-go-retry').onclick=function(){hideGameOver();startGame(ui.activeMode);};
  document.getElementById('screen-game').addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});

  updateModeBestScores();

}); // end onReady

}catch(e){
  console.error('[BlockPuzzle] Init error:',e);
  try{var m=document.getElementById('screen-menu');if(m)m.classList.add('screen--active');}catch(_){}
}

})();
</script>
</body>
</html>
