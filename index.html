<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Block Puzzle</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app-container">

    <!-- ═══ MENU ═══ -->
    <section id="screen-menu" class="screen screen--active">
      <div class="menu__inner">
        <h1 class="menu__title">BLOCK<br>PUZZLE</h1>
        <p class="menu__subtitle">Fit the blocks. Clear the lines.</p>
        <div class="menu__score-badge">
          <span class="score-badge__label">BEST</span>
          <span class="score-badge__value" id="highest-score-value">0</span>
        </div>
        <button class="btn btn--play menu__play-btn" id="btn-play" aria-label="Play">
          <span class="btn--play__text">PLAY</span>
          <span class="btn--play__pulse"></span>
        </button>
        <div class="level-carousel" id="level-carousel" role="list" aria-label="Level selection"></div>
      </div>
    </section>

    <!-- ═══ GAME ═══ -->
    <section id="screen-game" class="screen">
      <header class="status-bar">
        <button class="btn btn--icon status-bar__back" id="btn-back" aria-label="Back">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="status-bar__score-area">
          <span class="score-current" id="current-score">0</span>
          <span class="score-label">Score</span>
        </div>
        <div class="status-bar__meta">
          <span class="score-target">Target: <span id="target-score">500</span></span>
          <span class="score-best">Best: <span id="best-score">0</span></span>
        </div>
      </header>

      <div class="progress-bar"><div class="progress-bar__fill" id="progress-fill"></div></div>

      <!-- Grid wrapper also serves as combo popup anchor -->
      <div class="grid-wrapper" id="grid-wrapper">
        <div class="grid-canvas" id="grid-canvas"></div>
      </div>

      <div class="tray" id="piece-tray">
        <div class="tray__slot" id="tray-slot-0" data-slot="0"></div>
        <div class="tray__slot" id="tray-slot-1" data-slot="1"></div>
        <div class="tray__slot" id="tray-slot-2" data-slot="2"></div>
      </div>
    </section>

    <!-- ═══ MODAL ═══ -->
    <div id="modal-overlay" class="modal-overlay" aria-hidden="true">
      <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal__icon" id="modal-icon">🏆</div>
        <h2 class="modal__title" id="modal-title">Level Clear!</h2>
        <p class="modal__message" id="modal-message">Amazing work!</p>
        <div class="modal__score" id="modal-score">Score: 0</div>
        <div class="modal__stars" id="modal-stars">
          <span class="star" data-star="1">★</span>
          <span class="star" data-star="2">★</span>
          <span class="star" data-star="3">★</span>
        </div>
        <div class="modal__actions">
          <button class="btn btn--secondary" id="btn-modal-menu">Menu</button>
          <button class="btn btn--primary" id="btn-modal-retry">Retry</button>
          <button class="btn btn--primary btn--accent" id="btn-modal-next">Next Level</button>
        </div>
      </div>
    </div>

  </div>

  <script src="levels.js"></script>
  <script src="game.js"></script>
  <script>
  (function () {
    'use strict';

    function onReady(fn) {
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', fn, { once: true });
      } else { fn(); }
    }

    onReady(function initUI() {

      /* ── State ── */
      var ui = {
        screen: 'menu',
        currentLevel: 0,
        highestScore: parseInt(localStorage.getItem('bp_highest') || '0', 10),
        _scoreAnimating: false,
      };

      /* ── DOM ── */
      var $menu     = document.getElementById('screen-menu');
      var $game     = document.getElementById('screen-game');
      var $modal    = document.getElementById('modal-overlay');
      var $grid     = document.getElementById('grid-canvas');
      var $wrapper  = document.getElementById('grid-wrapper');
      var $progress = document.getElementById('progress-fill');
      var $curScore = document.getElementById('current-score');
      var $tgtScore = document.getElementById('target-score');
      var $bestScore= document.getElementById('best-score');
      var $carousel = document.getElementById('level-carousel');
      var $hiScore  = document.getElementById('highest-score-value');

      /* ── Projection ── */
      var _projCells = new Set();
      function clearProj() {
        _projCells.forEach(function (i) {
          var c = $grid.children[i];
          if (c) c.classList.remove('grid-cell--projected-valid', 'grid-cell--projected-invalid');
        });
        _projCells.clear();
      }
      function highlightProj(aR, aC, valid, filled) {
        clearProj();
        if (aR < 0 || aC < 0) return;
        filled.forEach(function (cell) {
          var br = aR + cell[0], bc = aC + cell[1];
          if (br >= 0 && br < 8 && bc >= 0 && bc < 8) {
            var idx = br * 8 + bc, el = $grid.children[idx];
            if (el) { el.classList.add(valid ? 'grid-cell--projected-valid' : 'grid-cell--projected-invalid'); _projCells.add(idx); }
          }
        });
      }

      /* ── Screens ── */
      function showScreen(name) {
        ui.screen = name;
        $menu.classList.toggle('screen--active', name === 'menu');
        $game.classList.toggle('screen--active', name === 'game');
      }

      function showModal(type, score) {
        var isClear = type === 'clear';
        document.getElementById('modal-icon').textContent    = isClear ? '🏆' : '💥';
        document.getElementById('modal-title').textContent   = isClear ? 'Level Clear!' : 'Game Over';
        document.getElementById('modal-message').textContent = isClear ? 'Ready for the next challenge?' : 'No more moves available!';
        document.getElementById('modal-score').textContent   = 'Score: ' + score;
        var lvl = GAME_LEVELS[BlockPuzzle.GameState.activeLevel];
        var ratio = score / (lvl ? lvl.targetScore : 500);
        var stars = ratio >= 1.5 ? 3 : ratio >= 1.0 ? 2 : 1;
        document.querySelectorAll('#modal-stars .star').forEach(function (el, i) { el.classList.toggle('star--lit', i < stars); });
        document.getElementById('btn-modal-next').style.display = isClear ? 'inline-flex' : 'none';
        $modal.classList.add('modal-overlay--visible');
        $modal.setAttribute('aria-hidden', 'false');
      }
      function hideModal() { $modal.classList.remove('modal-overlay--visible'); $modal.setAttribute('aria-hidden', 'true'); }

      /* ── Carousel ── */
      function renderCarousel() {
        $carousel.innerHTML = '';
        GAME_LEVELS.forEach(function (lvl, i) {
          var item = document.createElement('div');
          item.className = 'level-carousel__item' + (i === ui.currentLevel ? ' level-carousel__item--active' : '');
          item.setAttribute('role', 'listitem');
          item.innerHTML =
            '<span class="level-carousel__num">' + lvl.levelID + '</span>' +
            '<span class="level-carousel__diff">' + lvl.difficultyLabel + '</span>' +
            '<span class="level-carousel__target">🎯 ' + lvl.targetScore + '</span>';
          (function (idx) {
            item.addEventListener('click', function () { ui.currentLevel = idx; renderCarousel(); });
          })(i);
          $carousel.appendChild(item);
        });
      }

      /* ── Grid ── */
      function createGrid() {
        $grid.innerHTML = '';
        for (var r = 0; r < 8; r++)
          for (var c = 0; c < 8; c++) {
            var cell = document.createElement('div');
            cell.className = 'grid-cell';
            cell.dataset.row = r;
            cell.dataset.col = c;
            $grid.appendChild(cell);
          }
      }

      function renderGrid() {
        var grid = BlockPuzzle.GameState.grid;
        var cells = $grid.children;
        for (var r = 0; r < 8; r++)
          for (var c = 0; c < 8; c++) {
            var idx = r * 8 + c, val = grid[r][c], cell = cells[idx];
            cell.className = 'grid-cell';
            cell.style.background = '';
            cell.style.boxShadow = '';
            cell.style.border = '';
            cell.style.setProperty('--block-glow', 'transparent');
            cell.style.setProperty('--block-glow-faint', 'transparent');
            if (val === 'dead') {
              cell.classList.add('grid-cell--dead');
            } else if (val !== 0) {
              cell.classList.add('grid-cell--filled');
              // Vibrant solid gradient with high-contrast neon
              cell.style.background = 'linear-gradient(145deg, ' + val + 'ee, ' + val + 'bb)';
              cell.style.setProperty('--block-glow', val + '77');
              cell.style.setProperty('--block-glow-faint', val + '33');
            }
          }
      }

      /* ── Tray ── */
      function renderTray() {
        var pieces = BlockPuzzle.GameState.trayPieces;
        for (var i = 0; i < 3; i++) {
          var slot = document.getElementById('tray-slot-' + i);
          var piece = pieces[i];
          slot.innerHTML = '';
          slot.classList.remove('tray__slot--selected', 'tray__slot--empty');
          if (piece === null) { slot.classList.add('tray__slot--empty'); continue; }
          var shape = piece.shapeMatrix;
          var dims = BlockPuzzle.getShapeDimensions(shape);
          var maxR = dims.rows, maxC = dims.cols;

          // Scale the preview so large shapes fit inside the 80×80 slot.
          // The slot is 80px; we want the preview grid to fill ~70% of it.
          // Each "cell" in the preview grid is sized proportionally.
          // Max dimension (in cells): scale = 56 / (maxDim * cellPx)
          // We use a virtual cell size of 10px as base, then scale down.
          var slotSize = 70; // usable area in px
          var cellPx = 10;   // base cell size for preview
          var shapePx = Math.max(maxR, maxC) * cellPx;
          var scale = shapePx > slotSize ? slotSize / shapePx : 1;
          // Clamp: never scale above 1, never below 0.35
          scale = Math.max(0.35, Math.min(1, scale));

          // Build the unscaled grid
          var gridEl = document.createElement('div');
          gridEl.style.display = 'grid';
          gridEl.style.gridTemplateRows = 'repeat(' + maxR + ', 1fr)';
          gridEl.style.gridTemplateColumns = 'repeat(' + maxC + ', 1fr)';
          gridEl.style.gap = '1px';
          gridEl.style.width = (maxC * cellPx) + 'px';
          gridEl.style.height = (maxR * cellPx) + 'px';

          var filled = BlockPuzzle.getFilledCells(shape);
          for (var r = 0; r < maxR; r++)
            for (var c = 0; c < maxC; c++) {
              var isF = filled.some(function (fc) { return fc[0] === r && fc[1] === c; });
              var block = document.createElement('div');
              block.style.borderRadius = '2px';
              if (isF) {
                block.style.background = 'linear-gradient(135deg, ' + piece.color + ', ' + piece.color + 'cc)';
                block.style.boxShadow = 'inset 0 1px 1px rgba(255,255,255,0.3), 0 0 4px ' + piece.color + '44';
              } else {
                block.style.background = 'transparent';
              }
              block.className = 'piece-preview__block' + (isF ? ' piece-preview__block--filled' : '');
              gridEl.appendChild(block);
            }

          // Wrapper that centers and scales the grid
          var preview = document.createElement('div');
          preview.className = 'piece-preview';
          preview.style.display = 'flex';
          preview.style.alignItems = 'center';
          preview.style.justifyContent = 'center';
          preview.style.transform = 'scale(' + scale.toFixed(3) + ')';
          preview.style.transformOrigin = 'center center';
          preview.appendChild(gridEl);
          slot.appendChild(preview);
        }
      }

      /* ── HUD ── */
      function updateHUD() {
        var gs = BlockPuzzle.GameState;
        $curScore.textContent = Math.floor(gs.currentScore);
        var pct = Math.min(100, (gs.currentScore / gs.targetScore) * 100);
        $progress.style.width = pct + '%';
        if (gs.currentScore > ui.highestScore) {
          ui.highestScore = Math.floor(gs.currentScore);
          localStorage.setItem('bp_highest', ui.highestScore);
          $hiScore.textContent = ui.highestScore;
          $bestScore.textContent = ui.highestScore;
        }
      }

      /* ── Smooth score animation ── */
      function animateScoreDisplay(from, to) {
        if (ui._scoreAnimating) return;
        ui._scoreAnimating = true;
        BlockPuzzle.AnimCtrl.animateScore(from, to, 300, function (val) {
          $curScore.textContent = val;
        });
        setTimeout(function () { ui._scoreAnimating = false; }, 320);
      }

      /* ── Combo popup ── */
      function spawnComboPopup(text, row, col) {
        var gridRect = $grid.getBoundingClientRect();
        var wrapperRect = $wrapper.getBoundingClientRect();
        var cellSize = gridRect.width / 8;
        var x = gridRect.left - wrapperRect.left + (col + 0.5) * cellSize;
        var y = gridRect.top - wrapperRect.top + row * cellSize;
        BlockPuzzle.AnimCtrl.spawnComboPopup(text, $wrapper, x, y);
      }

      /* ═══════════════════════════════════════════════════════
         DRAG CONTROLLER
         ═══════════════════════════════════════════════════════ */

      var dragCtrl = new BlockPuzzle.DragController({
        onCommit: function (trayIndex, gR, gC, piece) {
          clearProj();
          var result = BlockPuzzle.placeBlock(gR, gC, piece.shapeMatrix, piece.color, trayIndex);
          var gs = BlockPuzzle.GameState;

          // Blast animation for cleared lines
          if (result.linesCleared > 0) {
            // Calculate center of blast for popup
            var allRows = result.clearedRows, allCols = result.clearedCols;
            var centerR = 0, centerC = 0, cnt = 0;
            allRows.forEach(function (r) { centerR += r; cnt++; });
            allCols.forEach(function (c) { centerC += c; cnt++; });
            if (cnt > 0) { centerR /= cnt; centerC /= cnt; }

            // Spawn combo popup before blast
            var comboText = '+' + result.scoreGained;
            if (result.combo > 1) comboText += ' x' + result.combo + ' Combo!';
            spawnComboPopup(comboText, centerR, centerC);

            // Animate blast, then update grid
            BlockPuzzle.AnimCtrl.blastLines(allRows, allCols, $grid).then(function () {
              renderGrid();
              renderTray();
            });
          } else {
            renderGrid();
            renderTray();
          }

          // Smooth score counter
          var prevScore = gs.currentScore - result.scoreGained;
          animateScoreDisplay(Math.floor(prevScore), Math.floor(gs.currentScore));
          updateHUD();

          // Check end conditions after blast completes
          var delay = result.linesCleared > 0 ? 500 : 50;
          setTimeout(function () {
            var endState = BlockPuzzle.checkEndConditions();
            if (endState.state === 'victory') {
              setTimeout(function () { showModal('clear', Math.floor(gs.currentScore)); }, 100);
            } else if (endState.state === 'gameover') {
              setTimeout(function () { showModal('over', Math.floor(gs.currentScore)); }, 100);
            }
          }, delay);
        },
        onCancel: function () { clearProj(); renderTray(); },
        onProjectionChange: function (aR, aC, valid, filled) { highlightProj(aR, aC, valid, filled); },
        getCellSize: function () { return $grid.getBoundingClientRect().width / 8; },
        isValidFn: function (r, c, s) { return BlockPuzzle.isValidPlacement(r, c, s); },
        getFilledCells: function (s) { return BlockPuzzle.getFilledCells(s); },
      });

      function onTrayPointerDown(e, idx) {
        var gs = BlockPuzzle.GameState;
        if (gs.isGameOver || gs.isLevelClear) return;
        if (gs.trayPieces[idx] === null) return;
        var slot = document.getElementById('tray-slot-' + idx);
        slot.classList.add('tray__slot--selected');
        dragCtrl.start(e, idx, gs.trayPieces[idx], $grid, slot);
      }

      /* ═══════════════════════════════════════════════════════
         GAME INIT
         ═══════════════════════════════════════════════════════ */

      function startGame() {
        BlockPuzzle.initLevel(ui.currentLevel);
        var lvl = GAME_LEVELS[ui.currentLevel];
        $tgtScore.textContent = lvl.targetScore;
        $bestScore.textContent = ui.highestScore;
        $curScore.textContent = '0';
        $progress.style.width = '0%';
        createGrid();
        renderGrid();
        renderTray();
        showScreen('game');
        hideModal();
      }

      window.startGame = startGame;

      /* ═══════════════════════════════════════════════════════
         EVENT LISTENERS
         ═══════════════════════════════════════════════════════ */

      document.getElementById('btn-play').addEventListener('click', function () { startGame(); });
      document.getElementById('btn-back').addEventListener('click', function () { showScreen('menu'); renderCarousel(); });

      [0, 1, 2].forEach(function (i) {
        var slot = document.getElementById('tray-slot-' + i);
        slot.addEventListener('pointerdown', function (e) { onTrayPointerDown(e, i); });
      });

      document.getElementById('btn-modal-menu').addEventListener('click', function () { hideModal(); showScreen('menu'); renderCarousel(); });
      document.getElementById('btn-modal-retry').addEventListener('click', function () { startGame(); });
      document.getElementById('btn-modal-next').addEventListener('click', function () {
        if (ui.currentLevel < GAME_LEVELS.length - 1) ui.currentLevel++;
        startGame();
      });

      /* ─── Init ─── */
      $hiScore.textContent = ui.highestScore;
      renderCarousel();

    }); // end onReady
  })();
  </script>
</body>
</html>
